name: Release Pipeline

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true

      - name: Update Go dependencies
        run: go mod tidy

      - name: Build binaries
        run: VERSION=${{ github.ref_name }} ./scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifacts
          path: bin/
          retention-days: 1

  docker-build:
    name: Build Docker Image (linux/${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set lowercase repo owner
        run: echo "REPO_OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ github.ref_name }}-linux-${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            TARGETARCH=${{ matrix.platform }}

  create-manifests:
    name: Create Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Set lowercase repo owner
        run: echo "REPO_OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ github.ref_name }} \
            ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ github.ref_name }}-linux-amd64 \
            ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ github.ref_name }}-linux-arm64
          docker manifest push ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ github.ref_name }}

      - name: Create and push latest multi-arch manifest
        run: |
          docker manifest create ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:latest \
            ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ github.ref_name }}-linux-amd64 \
            ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ github.ref_name }}-linux-arm64
          docker manifest push ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:latest

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build, create-manifests]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: bin/

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: bin/*
