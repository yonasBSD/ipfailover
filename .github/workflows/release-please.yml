name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Go
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build binaries
        if: ${{ steps.release.outputs.release_created }}
        run: ./scripts/build.sh

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          files: bin/*

      - name: Upload build artifacts for Docker
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          path: bin/
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        platform: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set lowercase repo owner
        run: echo "REPO_OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ needs.release-please.outputs.tag_name }}-linux-${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            TARGETARCH=${{ matrix.platform }}

  docker-manifest:
    runs-on: ubuntu-latest
    needs: [release-please, docker]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Set lowercase repo owner
        run: echo "REPO_OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ needs.release-please.outputs.tag_name }} \
            ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ needs.release-please.outputs.tag_name }}-linux-amd64 \
            ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ needs.release-please.outputs.tag_name }}-linux-arm64
          docker manifest push ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ needs.release-please.outputs.tag_name }}

      - name: Create and push latest multi-arch manifest
        run: |
          docker manifest create ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:latest \
            ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ needs.release-please.outputs.tag_name }}-linux-amd64 \
            ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:${{ needs.release-please.outputs.tag_name }}-linux-arm64
          docker manifest push ghcr.io/${{ env.REPO_OWNER_LOWER }}/ipfailover:latest
